<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Zakaat Tracker | Dark Neon</title>
    <style>
        /* Deep Midnight Background */
        body {
            background: radial-gradient(circle at top right, #252931 0%, #020617 100%);
        }
        /* Glass Card with a subtle border glow */
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(26, 55, 45, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Neon text effect */
        .neon-text {
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5), 0 0 20px rgba(7, 8, 8, 0.2);
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-900/20 blur-[120px] rounded-full"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/20 blur-[120px] rounded-full"></div>

    <div class="glass-card rounded-[2.5rem] p-8 max-w-lg w-full relative z-10 border-t-4 border-t-emerald-500">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-emerald-400 neon-text tracking-tighter italic uppercase">
                Zakat <span class="text-slate-100">Tracker</span>
            </h1>
            <div class="h-1 w-20 bg-emerald-500 mx-auto mt-2 rounded-full shadow-[0_0_10px_#10b981]"></div>
        </div>

        <div class="space-y-8">
            <section class="space-y-4">
                <div class="flex items-center gap-3">
                    <span class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400">💰</span>
                    <h2 class="text-sm font-bold tracking-widest text-emerald-400 uppercase">Your Assets</h2>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="group">
                        <label class="text-[10px] font-bold text-slate-500 mb-1 block transition-colors group-focus-within:text-emerald-400 uppercase">Gold (  Tola )</label>
                        <input type="number" id="gold_weight" placeholder="0" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-3 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-emerald-50 text-sm">
                    </div>
                    <div class="group">
                        <label class="text-[10px] font-bold text-slate-500 mb-1 block transition-colors group-focus-within:text-emerald-400 uppercase">Silver (  Tola )</label>
                        <input type="number" id="silver_weight" placeholder="0" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-3 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-emerald-50 text-sm">
                    </div>
                </div>

                <div class="group">
                    <label class="text-[10px] font-bold text-slate-500 mb-1 block uppercase">Cash / Profits</label>
                    <input type="number" id="cash_assets" placeholder="0.00" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 outline-none focus:border-emerald-500 transition-all text-emerald-50">
                </div>

                <div class="group">
                    <label class="text-[10px] font-bold text-slate-500 mb-1 block uppercase">Receivables</label>
                    <input type="number" id="receivables" placeholder="Money to recieve" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 outline-none focus:border-emerald-500 transition-all text-emerald-50">
                </div>
            </section>

            <section class="space-y-4">
                <div class="flex items-center gap-3">
                    <span class="p-2 bg-rose-500/10 rounded-lg text-rose-400">💸</span>
                    <h2 class="text-sm font-bold tracking-widest text-rose-400 uppercase">Liabilities</h2>
                </div>
                <input type="number" id="debts" placeholder="Debts to pay" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 outline-none focus:border-rose-500 transition-all text-rose-50">
            </section>

            <div class="grid grid-cols-2 gap-4 bg-slate-950/50 p-4 rounded-[1.5rem] border border-white/5">
                <div class="text-center">
                    <p class="text-[9px] text-slate-500 font-bold">GOLD RATE (1 Tola)</p>
                    <input type="number" id="gold_price" value="22000" class="bg-transparent text-center w-full text-emerald-400 font-bold outline-none text-lg">
                </div>
                <div class="text-center border-l border-slate-800">
                    <p class="text-[9px] text-slate-500 font-bold">SILVER RATE (1 Tola )</p>
                    <input type="number" id="silver_price" value="2500" class="bg-transparent text-center w-full text-emerald-400 font-bold outline-none text-lg">
                </div>
            </div>

            <button onclick="calculatezakat()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-5 rounded-[1.5rem] shadow-[0_10px_20px_-5px_#10b981] transition-all active:scale-95 uppercase tracking-widest text-sm">
                Calculate Zakat
            </button>
        </div>

        <div id="zakaat_amount" class="mt-8 p-6 rounded-[1.5rem] text-center hidden transform scale-100 transition-all border-2 border-dashed">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
